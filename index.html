    <style>
        /* --- GLOBAL STYLE PROPERTIES --- */
        :root {
            --bg-deep: #050a1a;
            --bg-panel: rgba(15, 26, 71, 0.95);
            --accent-cyan: #00f0ff;
            --accent-pink: #ff0055;
            --accent-gold: #ffd700;
            --accent-cyber-yellow: #ffea00; 

            /* --- NEFTYBLOCKS SHADOW DOM BRANDING VARS --- */
            --nefty-font-family: 'Orbitron', sans-serif;
            --nefty-font-size: 14px;
            --nefty-radius: 8px;
            --nefty-radius-image: 6px;
            
            --nefty-bg-drop: rgba(5, 10, 26, 0.8);
            --nefty-bg-mint: #050a1a;
            --nefty-bg-inputs: #000000;
            --nefty-bg-markdown: rgba(0, 0, 0, 0.4);
            
            --nefty-border: #222222;
            --nefty-border-drop: var(--accent-cyber-yellow);
            --nefty-border-size: 2px;
            
            --nefty-color: #ffffff;
            --nefty-color-secondary: #888888;
            --nefty-color-highlight: var(--accent-cyan);
            
            --nefty-btn-primary: #000000;
            --nefty-btn-primary-bg: var(--accent-cyber-yellow);
            --nefty-btn-primary-border: var(--accent-cyber-yellow);
            --nefty-btn-primary--active: #ffffff;
            --nefty-btn-primary-bg--active: var(--accent-pink);
            --nefty-btn-primary-border--active: var(--accent-pink);

            --nefty-btn-secondary: #ffffff;
            --nefty-btn-secondary-bg: #000000;
            --nefty-btn-secondary-border: #333333;
        }

        /* --- THEME WRAPPER STYLING --- */
        body { 
            background-color: var(--bg-deep);
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-image: radial-gradient(circle at 50% 50%, #162a5e 0%, #050a1a 100%); 
            background-attachment: fixed; 
            min-height: 100vh;
        }

        header { 
            background: rgba(0, 0, 0, 0.9);
            padding: 20px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 2px solid var(--accent-cyber-yellow);
            box-shadow: 0 5px 20px rgba(255, 234, 0, 0.1);
        }

        .logo { 
            margin: 0; 
            font-family: 'Orbitron'; 
            font-weight: 900; 
            font-size: 1.8rem; 
            letter-spacing: 2px; 
            text-shadow: 0 0 10px var(--accent-cyber-yellow); 
            color: var(--accent-cyber-yellow); 
        }

        .container { 
            padding: 40px; 
            max-width: 1200px; 
            margin: auto; 
        }

        /* --- DEEP SHADOW PARTS CUSTOM OVERRIDES --- */
        neftyblocks-drops::part(drop) {
            box-shadow: 0 0 25px rgba(255, 234, 0, 0.15);
            background: linear-gradient(180deg, rgba(15,26,71,0.9), rgba(5,10,26,0.9)) !important;
        }

        neftyblocks-drops::part(drop-title) {
            color: var(--accent-cyan) !important;
            font-family: 'Orbitron' !important;
            font-weight: 900 !important;
            text-shadow: 0 0 8px var(--accent-cyan);
        }

        neftyblocks-drops::part(pagination-btn) {
            font-family: 'Orbitron' !important;
            font-weight: 700;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<header>
    <h1 class="logo">sk8dao // drops</h1>
    <div style="font-family:'Orbitron'; font-size:0.8rem; color:var(--accent-cyan); font-weight:900;">NETWORK // WAX MAINNET</div>
</header>

<div class="container">
    <div style="margin-bottom: 30px; text-align: center; border-left: 3px solid var(--accent-cyan); padding: 15px; background: rgba(0,0,0,0.4);">
        <span style="font-family:'Orbitron'; font-weight:900; color:var(--accent-cyan); letter-spacing:1px;">LAUNCHING VERIFIED SUPREME DROP GATEWAY</span>
    </div>

    <neftyblocks-drops 
        collection="skatecoinwax" 
        limit="8" 
        network="mainnet"
        chain="wax">

</div> <script type="module" src="https://cdn.jsdelivr.net/npm/@neftyblocks/drops@latest"></script>

</html>
