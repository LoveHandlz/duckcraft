<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>sk8dao | THE SENATE CHAMBER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bangers&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* --- GLOBAL VARIABLES & FLUID SCALING --- */
        :root {
            --bg-deep: #050a1a;
            --bg-panel: rgba(15, 26, 71, 0.95);
            --accent-cyan: #00f0ff;
            --accent-pink: #ff0055;
            --accent-gold: #ffd700;
            --accent-cyber-yellow: #ffea00; 
            --card-border: rgba(0, 240, 255, 0.2);
            
            /* BASE RARITIES */
            --rarity-common: #94a3b8; 
            --rarity-uncommon: #00ffaa; 
            --rarity-rare: #00bfff;
            --rarity-epic: #d946ef; 
            
            /* GOD TIER BASE COLORS */
            --rarity-legendary: #ffd700; 
            --rarity-mythic: #ff00ff; 
            --rarity-insane: #ff0033; 
            --rarity-ridiculous: #ff007f; 
            
            /* SPACING SAFE ZONES */
            --pad-safe: clamp(15px, 4vw, 40px);
            --modal-pad: clamp(20px, 5vw, 40px);
        }

        /* Prevent horizontal scroll on mobile */
        html, body {
            overflow-x: hidden;
            width: 100%;
        }

        /* --- CYBER-YELLOW FRAME PROTOCOL --- */
        .cyber-yellow-frame {
            border: 2px solid var(--accent-cyber-yellow) !important;
            box-shadow: 0 0 20px rgba(255, 234, 0, 0.2), inset 0 0 15px rgba(255, 234, 0, 0.1) !important;
        }

        /* --- RGB TEXT ANIMATION --- */
        @keyframes rainbowText {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        .text-rgb {
            background: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff, #ff0000);
            background-size: 200% auto;
            color: transparent !important; 
            -webkit-background-clip: text;
            background-clip: text;
            animation: rainbowText 1.5s linear infinite; 
            font-weight: 900;
        }

        /* --- RGB HUD & STAT BAR INFECTION --- */
        @keyframes rgbHudPulse {
            0% { border-color: rgba(255,0,0,0.8); box-shadow: inset 0 0 10px rgba(255,0,0,0.2); }
            33% { border-color: rgba(0,255,0,0.8); box-shadow: inset 0 0 10px rgba(0,255,0,0.2); }
            66% { border-color: rgba(0,0,255,0.8); box-shadow: inset 0 0 10px rgba(0,0,255,0.2); }
            100% { border-color: rgba(255,0,0,0.8); box-shadow: inset 0 0 10px rgba(255,0,0,0.2); }
        }
        .card-glow-rgb .rgb-hud-frame {
            border: 1px solid #ff0000;
            animation: rgbHudPulse 2s linear infinite !important;
        }
        .card-glow-rgb .stat-bar {
            background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000) !important;
            background-size: 200% !important;
            animation: rainbowText 1.5s linear infinite !important;
        }

        /* --- SUPREME RGB BEARING GLOW --- */
        @keyframes rgbCardPulse {
            0% { box-shadow: inset 0 0 50px rgba(255,0,0,0.3), 0 0 25px rgba(255,0,0,0.6); border-color: #ff0000; }
            33% { box-shadow: inset 0 0 50px rgba(0,255,0,0.3), 0 0 25px rgba(0,255,0,0.6); border-color: #00ff00; }
            66% { box-shadow: inset 0 0 50px rgba(0,0,255,0.3), 0 0 25px rgba(0,0,255,0.6); border-color: #0000ff; }
            100% { box-shadow: inset 0 0 50px rgba(255,0,0,0.3), 0 0 25px rgba(255,0,0,0.6); border-color: #ff0000; }
        }
        .card-glow-rgb { animation: rgbCardPulse 2s linear infinite !important; }
        .card-glow-rgb .rarity-header { background: linear-gradient(90deg, #ff0000, #00ff00, #0000ff, #ff0000) !important; background-size: 200% !important; animation: rainbowText 2s linear infinite !important; color: #fff !important; text-shadow: 1px 1px 2px #000; box-shadow: 0 0 20px rgba(255,255,255,0.3) !important; }
        .card-glow-rgb .skate-img { filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.8)); }

        /* --- EXTREME GOD TIER GLOW CLASSES --- */
        .card-glow-epic { box-shadow: inset 0 0 50px rgba(217, 70, 239, 0.3), 0 0 20px rgba(217, 70, 239, 0.5) !important; border-color: var(--rarity-epic) !important; }
        .card-glow-epic .rarity-header { background: var(--rarity-epic) !important; color: #fff !important; box-shadow: 0 0 30px rgba(217, 70, 239, 0.8) !important; }
        .card-glow-epic .skate-img { filter: drop-shadow(0 0 15px rgba(217, 70, 239, 0.9)); }

        .card-glow-legendary { box-shadow: inset 0 0 50px rgba(255, 215, 0, 0.2), 0 0 20px rgba(255, 215, 0, 0.4) !important; border-color: var(--rarity-legendary) !important; }
        .card-glow-legendary .rarity-header { background: var(--rarity-legendary) !important; color: #000 !important; box-shadow: 0 0 30px rgba(255, 215, 0, 0.7) !important; }
        .card-glow-legendary .skate-img { filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.8)); }

        .card-glow-insane { box-shadow: inset 0 0 60px rgba(255, 0, 51, 0.3), 0 0 25px rgba(255, 0, 51, 0.5) !important; border-color: var(--rarity-insane) !important; }
        .card-glow-insane .rarity-header { background: var(--rarity-insane) !important; color: #fff !important; box-shadow: 0 0 40px rgba(255, 0, 51, 0.9) !important; }
        .card-glow-insane .skate-img { filter: drop-shadow(0 0 20px rgba(255, 0, 51, 1)); }

        @keyframes mythicRainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        .card-glow-mythic { box-shadow: inset 0 0 60px rgba(255, 0, 255, 0.3), 0 0 25px rgba(255, 0, 255, 0.5) !important; border-color: #ff00ff !important; animation: mythicRainbow 4s linear infinite; }
        .card-glow-mythic .rarity-header { background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000) !important; background-size: 200% !important; color: #fff !important; text-shadow: 1px 1px 2px #000; box-shadow: 0 0 40px rgba(255, 0, 255, 0.7) !important; animation: mythicRainbow 3s linear infinite; }
        .card-glow-mythic .skate-img { filter: drop-shadow(0 0 20px rgba(255, 0, 255, 0.8)); }      
        
        .card-glow-ridiculous { box-shadow: inset 0 0 60px rgba(255, 0, 127, 0.3), 0 0 25px rgba(255, 0, 127, 0.5) !important; border-color: var(--rarity-ridiculous) !important; }
        .card-glow-ridiculous .rarity-header { background: var(--rarity-ridiculous) !important; color: #fff !important; box-shadow: 0 0 40px rgba(255, 0, 127, 0.9) !important; }
        .card-glow-ridiculous .skate-img { filter: drop-shadow(0 0 20px rgba(255, 0, 127, 1)); }

        /* --- BASE BODY & LAYOUT --- */
        body { 
            background-color: var(--bg-deep);
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-image: radial-gradient(circle at 50% 50%, #162a5e 0%, #050a1a 100%); 
            background-attachment: fixed; 
            min-height: 100vh;
            display: flex; 
            flex-direction: column; 
        }

        /* --- HEADER & NAV --- */
        header { 
            background: rgba(0, 0, 0, 0.9);
            padding: clamp(10px, 2vw, 15px) var(--pad-safe); 
            display: flex; 
            justify-content: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            backdrop-filter: blur(10px); 
            border-bottom: 2px solid var(--accent-cyber-yellow);
            box-shadow: 0 5px 20px rgba(255, 234, 0, 0.1);
        }
        .header-inner { 
            width: 100%; 
            max-width: 1400px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .senate-logo { 
            margin: 0; 
            font-family: 'Orbitron'; 
            font-weight: 900; 
            font-size: clamp(1.2rem, 3vw, 1.8rem); 
            cursor: pointer; 
            letter-spacing: 2px; 
            text-shadow: 0 0 10px var(--accent-cyber-yellow), 0 0 20px var(--accent-cyber-yellow); 
            color: var(--accent-cyber-yellow); 
            text-transform: lowercase; 
            z-index: 1100; /* Stays above mobile menu */
        }
        .senate-logo span { color: var(--accent-pink); text-shadow: 0 0 10px var(--accent-pink), 0 0 20px var(--accent-pink); }

        /* --- DESKTOP NAV --- */
        nav { display: flex; align-items: center; }
        nav ul { display: flex; list-style: none; gap: clamp(10px, 1.5vw, 18px); margin: 0; padding: 0; }
        nav a { color: #888; text-decoration: none; font-family: 'Orbitron'; font-size: clamp(0.65rem, 1vw, 0.75rem); font-weight: 900; letter-spacing: 2px; padding-bottom: 5px; transition: 0.2s; }
        nav a.active, nav a:hover { color: var(--accent-cyber-yellow); text-shadow: 0 0 8px var(--accent-cyber-yellow); border-bottom: 2px solid var(--accent-cyber-yellow); }
        
        .header-controls { display: flex; align-items: center; gap: clamp(5px, 1vw, 10px); z-index: 1100; }
        
        .balance-pill { background: rgba(255, 234, 0, 0.05); border: 1px solid var(--accent-cyber-yellow); padding: 6px clamp(10px, 1.5vw, 15px); border-radius: 50px; font-family: 'Orbitron'; font-size: clamp(0.55rem, 1vw, 0.65rem); display: flex; gap: clamp(5px, 1vw, 15px); }
        .balance-pill span { color: var(--accent-gold); font-weight: 900; }
        
        .wallet-btn { background: var(--accent-cyber-yellow); color: #000; border: none; padding: 10px clamp(12px, 2vw, 20px); font-family: 'Orbitron'; font-weight: 900; font-size: clamp(0.65rem, 1vw, 0.85rem); cursor: pointer; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%); transition: 0.2s; white-space: nowrap; }
        .wallet-btn:hover { background: #fff; }
        .wallet-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

        /* --- MOBILE HAMBURGER & OVERLAY MATRIX --- */
        .hamburger {
            display: none;
            font-size: 1.8rem;
            color: var(--accent-cyber-yellow);
            cursor: pointer;
            z-index: 1100;
            user-select: none;
            text-shadow: 0 0 10px var(--accent-cyber-yellow);
        }

        @media (max-width: 900px) {
            .hamburger { display: block; }
            nav {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100vh;
                background: rgba(5, 10, 26, 0.98);
                backdrop-filter: blur(15px);
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                transform: translateY(-100%);
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 1050;
                border-bottom: 2px solid var(--accent-cyber-yellow);
            }
            nav.nav-active {
                transform: translateY(0);
            }
            nav ul {
                flex-direction: column;
                gap: 30px;
                text-align: center;
            }
            nav a {
                font-size: 1.5rem;
            }
            .header-controls {
                flex-direction: column-reverse;
                align-items: flex-end;
            }
            .balance-pill { 
                display: none !important; /* Hide balance on small mobile header to save space, rely on treasury dash */
            } 
        }

        /* --- LAYOUT WRAPPERS --- */
        .dashboard-wrapper { padding: var(--pad-safe); max-width: 1400px; margin: auto; flex: 1; width: 100%; box-sizing: border-box; position: relative; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 300px), 1fr)); gap: clamp(15px, 3vw, 30px); }
        
        /* --- INVENTORY CARDS --- */
        .skate-card { background: var(--bg-panel); border: 1px solid var(--card-border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.2s; width: 100%; box-sizing: border-box; }
        .skate-card:hover { transform: translateY(-5px); border-color: var(--accent-gold); box-shadow: 0 5px 20px rgba(255,215,0,0.15); }
        .rarity-header { padding: clamp(8px, 2vw, 12px) clamp(10px, 2vw, 15px); display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 10; border-bottom: 2px solid rgba(255,255,255,0.4); }
        .rarity-header-text { font-family: 'Orbitron'; font-size: clamp(0.7rem, 2vw, 0.8rem); font-weight: 900; letter-spacing: 2px; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); margin-top: 2px; line-height: 1; text-transform: uppercase; }
        .mint-badge { background: #000; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: clamp(0.55rem, 1.5vw, 0.65rem); font-family: 'Orbitron'; font-weight: 900; border: 1px solid rgba(255,255,255,0.3); box-shadow: inset 0 0 5px rgba(255,255,255,0.2); }
        .img-wrap { width: 100%; height: clamp(150px, 25vw, 200px); display: flex; justify-content: center; align-items: center; background: #000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .skate-img { max-height: 85%; max-width: 85%; object-fit: contain; }
        .card-body { padding: clamp(15px, 3vw, 20px); flex: 1; }
        .board-name { font-family: 'Orbitron'; font-weight: 900; font-size: clamp(1.1rem, 3vw, 1.4rem); margin: 0 0 15px 0; text-transform: uppercase; line-height: 1.1; color: var(--accent-cyber-yellow); }
        .meta-title { font-family: 'Orbitron'; font-weight: 400; font-size: 0.6rem; color: #888; letter-spacing: 2px; margin-bottom: 6px; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 4px; text-transform: uppercase; }
        .stat-bar-container { width: 100%; height: 6px; background: #111; border: 1px solid #333; border-radius: 3px; margin-top: 3px; overflow: hidden; }
        .stat-bar { height: 100%; transition: width 0.5s ease-out; }
        .stat-pop { background: linear-gradient(90deg, #ff0055, #ff55aa); }
        .stat-balance { background: linear-gradient(90deg, #aa00ff, #e066ff); }
        .stat-speed { background: linear-gradient(90deg, #00aaff, #00ffff); }
        .stat-total { background: linear-gradient(90deg, #ffaa00, #ffff00); }
        .claim-zone { padding: 15px clamp(15px, 3vw, 20px); background: rgba(0,0,0,0.8); border-top: 1px solid var(--accent-gold); display: flex; justify-content: space-between; align-items: center; }
        .reward-skate { font-family: 'Orbitron'; font-weight: 900; font-size: clamp(1.2rem, 3vw, 1.5rem); color: #fff; line-height: 1; margin-bottom: 4px; }
        .reward-wax { font-family: 'Inter'; font-size: 0.75rem; color: var(--accent-gold); font-weight: 900; }
        .skate-icon { width: clamp(20px, 4vw, 26px); height: clamp(20px, 4vw, 26px); vertical-align: middle; margin-right: 8px; }

        /* --- CRAFTING --- */
        .crafting-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 350px), 1fr)); gap: clamp(15px, 3vw, 30px); background: rgba(0,0,0,0.5); padding: clamp(15px, 4vw, 30px); border-radius: 12px; border: 1px solid var(--accent-cyber-yellow); box-sizing: border-box; }
        .craft-slot { background: rgba(255, 234, 0, 0.05); border: 1px solid var(--card-border); padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .craft-slot h4 { margin: 0 0 10px 0; color: var(--accent-cyber-yellow); font-family: 'Orbitron'; font-weight: 900; font-size: 0.8rem; text-transform: uppercase; }
        .craft-slot select { width: 100%; padding: 10px; background: #000; color: #fff; border: 1px solid #333; font-size: 0.8rem; margin-bottom: 5px; outline: none; box-sizing: border-box; }
        .projected-stats { background: #000; padding: clamp(15px, 4vw, 25px); border-radius: 8px; border: 1px solid var(--accent-gold); display: flex; flex-direction: column; justify-content: space-between; }
        .nft-visual-thumbnail { width: clamp(35px, 8vw, 45px); height: clamp(35px, 8vw, 45px); object-fit: contain; background: #111; border: 1px solid var(--accent-cyber-yellow); border-radius: 4px; padding: 3px; }

        /* --- MODALS CSS SCALING (Add this to the Modals section later, or replace existing rules) --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--bg-panel); padding: var(--modal-pad); border-radius: 15px; border: 2px solid var(--accent-cyber-yellow); text-align: center; box-shadow: 0 0 30px rgba(255, 234, 0, 0.15); max-height: 90vh; overflow-y: auto; box-sizing: border-box; width: 90%; max-width: 450px; }
        .modal-content h2 { font-size: clamp(1.4rem, 5vw, 2.2rem) !important; }
        .modal-content p { font-size: clamp(0.75rem, 3vw, 0.85rem) !important; }

        /* --- SENATE UI CLASSES (DAO V3 MATRIX) --- */
        .senate-jumbotron { width: 100%; border: 2px solid var(--accent-cyber-yellow); border-radius: 8px; overflow: hidden; margin-bottom: clamp(20px, 4vw, 40px); box-shadow: 0 0 30px rgba(255, 234, 0, 0.2); background: #000; }
        .senate-jumbotron img { width: 100%; display: block; max-height: clamp(150px, 30vw, 400px); object-fit: cover; opacity: 0.9; }
        
        .dao-hud-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 250px), 1fr)); gap: clamp(10px, 2vw, 20px); margin-bottom: clamp(20px, 4vw, 40px); }
        .dao-hud-card { background: linear-gradient(180deg, rgba(15,26,71,0.9), rgba(5,10,26,0.9)); border: 2px solid #333; border-radius: 8px; padding: clamp(15px, 3vw, 20px); text-align: center; box-shadow: inset 0 0 30px rgba(0,0,0,0.8); position: relative; overflow: hidden; }
        .dao-hud-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); }
        .dao-hud-card.active-rank { border-color: var(--accent-cyber-yellow); box-shadow: inset 0 0 40px rgba(255, 234, 0, 0.1); }
        .dao-hud-card.active-rank::before { background: linear-gradient(90deg, transparent, var(--accent-cyber-yellow), transparent); }

        /* --- NEW: 6-BUTTON DAO CONTROL GRID --- */
        .dao-controls-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 250px), 1fr)); gap: clamp(10px, 2vw, 15px); margin-bottom: 30px; }
        
        .motion-card { background: linear-gradient(180deg, #111, #000); border: 2px solid #333; border-radius: 12px; padding: clamp(15px, 4vw, 30px); position: relative; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); box-sizing: border-box; width: 100%; }
        .motion-card::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 5px; background: repeating-linear-gradient(90deg, #333, #333 10px, transparent 10px, transparent 20px); }
        .motion-card.tipped { border-color: var(--accent-gold); box-shadow: 0 0 25px rgba(255,215,0,0.15); }
        .motion-timer { font-family: 'Orbitron'; font-weight: 900; font-size: clamp(0.7rem, 2vw, 0.9rem); position: absolute; top: clamp(10px, 3vw, 25px); right: clamp(10px, 3vw, 25px); display: flex; align-items: center; gap: 5px; background: #000; padding: 5px 10px; border-radius: 4px; border: 1px solid #333;}
        .motion-timer.safe { color: #00ffaa; border-color: rgba(0,255,170,0.3); }
        .motion-timer.danger { color: var(--accent-pink); animation: pulse 1.5s infinite; border-color: rgba(255,0,85,0.3); }
        
        .motion-data-hud { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 150px), 1fr)); gap: 10px; background: rgba(0,0,0,0.5); border: 1px solid #222; border-radius: 6px; padding: clamp(10px, 3vw, 15px); margin: 20px 0; }
        .motion-data-stat { text-align: center; border-right: 1px dashed #333; padding: 5px; }
        .motion-data-stat:last-child { border-right: none; }
        .motion-data-label { font-family: 'Orbitron'; font-size: clamp(0.55rem, 1.5vw, 0.6rem); color: #888; margin-bottom: 5px; letter-spacing: 1px; }
        .motion-data-val { font-family: 'Orbitron'; font-size: clamp(0.9rem, 2vw, 1.1rem); color: #fff; font-weight: 900; }

        .vote-bar-bg { width: 100%; height: clamp(8px, 2vw, 12px); background: rgba(255, 0, 85, 0.2); border-radius: 6px; margin: 15px 0; display: flex; overflow: hidden; border: 1px solid #333; }
        .vote-bar-yes { height: 100%; background: linear-gradient(90deg, #00aa77, #00ffaa); transition: width 0.5s; box-shadow: 0 0 10px rgba(0,255,170,0.5); }
        
        .dao-action-btn { background: #000; border: 2px solid #555; color: #fff; font-family: 'Orbitron'; font-size: clamp(0.7rem, 2vw, 0.8rem); font-weight: 900; padding: clamp(10px, 2vw, 15px); cursor: pointer; transition: 0.2s; border-radius: 6px; text-transform: uppercase; letter-spacing: 1px; flex: 1; text-align: center; white-space: normal; line-height: 1.3;}
        .dao-action-btn:hover { transform: translateY(-2px); }
        .btn-yes { border-color: #00ffaa; color: #00ffaa; box-shadow: inset 0 0 10px rgba(0,255,170,0.1); } 
        .btn-yes:hover { background: #00ffaa; color: #000; box-shadow: 0 0 15px rgba(0,255,170,0.4); }
        .btn-no { border-color: var(--accent-pink); color: var(--accent-pink); box-shadow: inset 0 0 10px rgba(255,0,85,0.1);} 
        .btn-no:hover { background: var(--accent-pink); color: #000; box-shadow: 0 0 15px rgba(255,0,85,0.4); }

        /* --- LEGISLATIVE DRAFT & SLIDER INTERFACES --- */
        .proposal-input { width: 100%; padding: clamp(10px, 3vw, 15px); background: #000; border: 1px solid #333; color: #fff; font-family: 'Inter', sans-serif; font-size: clamp(0.85rem, 2vw, 0.95rem); border-radius: 4px; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        .proposal-input:focus { border-color: var(--accent-cyber-yellow); }
        .slider-box { background: rgba(0,0,0,0.5); border: 1px solid #222; padding: clamp(10px, 3vw, 15px); border-radius: 6px; margin: 15px 0; display: flex; align-items: center; gap: clamp(8px, 2vw, 15px); justify-content: space-between; flex-wrap: wrap;}
        .weight-slider { -webkit-appearance: none; appearance: none; flex: 1; min-width: 150px; height: 8px; border-radius: 4px; background: #111; outline: none; border: 1px solid #333; }

<script type="module">
    import { SessionKit } from 'https://esm.sh/@wharfkit/session?bundle';
    import { WebRenderer } from 'https://esm.sh/@wharfkit/web-renderer?bundle';
    import { WalletPluginCloudWallet } from 'https://esm.sh/@wharfkit/wallet-plugin-cloudwallet?bundle';

    const ATOMIC_API = "https://wax.api.atomicassets.io/atomicassets/v1";
    const COLLECTION = "skatecoinwax";
    const WAX_RPC = "https://wax.greymass.com";
    const HISTORY_RPC = "https://api.waxsweden.org"; 
    const ADMIN_WALLET = "ufuau.wam";

    class MetaParser {
        static getRaw(nft, key) {
            if (nft.data && nft.data[key] !== undefined) return nft.data[key];
            if (nft.template && nft.template.immutable_data && nft.template.immutable_data[key] !== undefined) return nft.template.immutable_data[key];
            return null;
        }
        static getInt(nft, key) { return parseInt(this.getRaw(nft, key)) || 0; }
        static getString(nft, key, fallback = 'N/A') { 
            const val = this.getRaw(nft, key);
            return val ? String(val).toUpperCase() : fallback; 
        }
        static getImg(nft) { return this.getRaw(nft, 'img') || ''; }
        static getRarity(nft) { return this.getString(nft, 'rarity', 'COMMON').toLowerCase(); }
    }

    const sessionKit = new SessionKit({
        appName: 'sk8dao',
        chains: [{ id: '1064487b3cd1a897ce03ae5b6a865651747e2e152090f99c1d19d44e01aea5a4', url: WAX_RPC }],
        ui: new WebRenderer(),
        walletPlugins: [ new WalletPluginCloudWallet() ]
    });
    
    let currentSession = null, currentSchema = null, currentInventoryPage = 1;
    let calculatedWaxFee = 0, selectedAssetIds = [];
    
    let historyStack = [];
    let isProgrammaticHashChange = false;
    let defiWarningShown = false;
    
    let isWaxToSkate = true;
    let currentSlippage = 0.05; 
    let waxUsdPrice = 0.045; 
    let skatePerWax = 7.6897; 
    let sWax = 1 / skatePerWax;
    
    // Global Max Votes assigned directly by Rank
    window.currentUserMaxVotes = 0; 

    // --- GLOBAL MODAL ROUTERS ---
    window.showErrorModal = (msg) => {
        closeModals();
        document.getElementById('error-modal-msg').innerText = msg;
        document.getElementById('error-modal').style.display = 'flex';
    };

    window.showSuccessModal = (title, msg) => {
        closeModals();
        document.getElementById('success-modal-title').innerText = title;
        document.getElementById('success-modal-msg').innerText = msg;
        document.getElementById('success-modal').style.display = 'flex';
    };

    window.closeModals = () => { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); };
    window.toggleAuthModal = () => { if(!currentSession) document.getElementById('vip-ticket-modal').style.display = 'flex'; else document.getElementById('disconnect-modal').style.display = 'flex'; };

    window.openBrandModal = (brandName) => {
        closeModals();
        document.getElementById('brand-modal-title').innerText = brandName;
        document.getElementById('brand-detail-modal').style.display = 'flex';
    };

    window.openStoreComingSoon = () => {
        closeModals();
        document.getElementById('store-coming-soon-modal').style.display = 'flex';
    };

    // --- ORACLE SYNC ---
    async function syncPrices() {
        try {
            const usdRes = await fetch('https://alcor.exchange/api/v2/tokens/wax-eosio.token');
            const usdData = await usdRes.json();
            if(usdData && usdData.usd_price) waxUsdPrice = usdData.usd_price;

            const tickerRes = await fetch('https://alcor.exchange/api/v2/tickers/skate-skatecoinwax_wax-eosio.token');
            const tickerData = await tickerRes.json();
            if(tickerData && tickerData.last_price) {
                sWax = tickerData.last_price;
                skatePerWax = 1 / sWax;
            }
        } catch(e) { console.log('Oracle Sync Error. Operating on offline fallback metrics.'); }
        
        if(document.getElementById('oracle-price')) {
            document.getElementById('oracle-price').innerText = `1 WAX ≈ ${skatePerWax.toFixed(4)} $SKATE  |  WAX: $${waxUsdPrice.toFixed(4)}`;
        }
    }

    // --- SENATE RANKING LOGIC (Determines true voting weight) ---
    function calculateDaoRank(cumulativeUsd) {
        if (cumulativeUsd >= 50000) return { rank: "LEGENDARY", votes: 100, color: "#a855f7", badge: "m-badge-legendary" };
        if (cumulativeUsd >= 10000) return { rank: "ELITE", votes: 20, color: "#2196f3", badge: "m-badge-elite" };
        if (cumulativeUsd >= 1000)  return { rank: "PRO", votes: 4, color: "#ffd700", badge: "m-badge-pro" };
        if (cumulativeUsd >= 250)   return { rank: "AMATEUR", votes: 2, color: "#c0c0c0", badge: "m-badge-amateur" };
        if (cumulativeUsd >= 50)    return { rank: "FLOW", votes: 3, color: "#cd7f32", badge: "m-badge-flow" };
        if (cumulativeUsd >= 1)     return { rank: "GROMMET", votes: 1, color: "#00ffaa", badge: "m-badge-grom" };
        return { rank: "POSER", votes: 0, color: "#94a3b8", badge: "m-badge-poser" };
    }

    // --- ON-CHAIN SCRAPER (Treasury & Rank Sync) ---
    async function fetchTreasuryData() {
        await syncPrices();
        
        const whaleList = document.getElementById('treasury-whales-list');
        const pulseList = document.getElementById('treasury-pulse-list');
        
        const waxResDOM = document.getElementById('treasury-wax-res');
        const waxUsdDOM = document.getElementById('treasury-wax-usd');
        const skateResDOM = document.getElementById('treasury-skate-res');
        const skateUsdDOM = document.getElementById('treasury-skate-usd');
        
        const circMcapDOM = document.getElementById('cg-circ-mcap');
        const fdvDOM = document.getElementById('cg-fdv');

        if(whaleList) whaleList.innerHTML = `<div style="padding: 20px; text-align: center; color: var(--accent-gold); font-family: 'Orbitron'; font-weight: 900;">SCANNING LEDGER...</div>`;
        if(pulseList) pulseList.innerHTML = `<div style="padding: 20px; text-align: center; color: var(--accent-cyan); font-family: 'Orbitron'; font-weight: 900;">INTERCEPTING LEDGER...</div>`;

        try {
            // Live Reserve Extraction
            const waxRes = await fetch(`${WAX_RPC}/v1/chain/get_currency_balance`, { method: 'POST', body: JSON.stringify({ code: "eosio.token", account: "skatecoinwax", symbol: "WAX" }) });
            const waxBalArr = await waxRes.json(); 
            const waxBal = waxBalArr[0] ? parseFloat(waxBalArr[0].split(' ')[0]) : 0;
            
            const skateRes = await fetch(`${WAX_RPC}/v1/chain/get_currency_balance`, { method: 'POST', body: JSON.stringify({ code: "skatecoinwax", account: "skatecoinwax", symbol: "SKATE" }) });
            const skateBalArr = await skateRes.json();
            const skateBal = skateBalArr[0] ? parseFloat(skateBalArr[0].split(' ')[0]) : 0;

            const skatePriceUSD = sWax * waxUsdPrice;
            
            const circulating_supply = 1000000;
            const total_supply = 1000000000; 
            const circMcapUsd = circulating_supply * skatePriceUSD;
            const fdvUsd = total_supply * skatePriceUSD; 
            
            if(circMcapDOM) circMcapDOM.innerText = `$${circMcapUsd.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            if(fdvDOM) fdvDOM.innerText = `$${fdvUsd.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            if(waxResDOM) waxResDOM.innerText = waxBal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' WAX';
            if(waxUsdDOM) waxUsdDOM.innerText = `≈ $${(waxBal * waxUsdPrice).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} USD`;
            if(skateResDOM) skateResDOM.innerText = skateBal.toLocaleString(undefined, {minimumFractionDigits: 4, maximumFractionDigits: 4}) + ' SKATE';
            if(skateUsdDOM) skateUsdDOM.innerText = `≈ $${(skateBal * skatePriceUSD).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} USD`;

            // Hyperion Historical Scraper Logic
            const historyUrl = `${HISTORY_RPC}/v2/history/get_actions?account=skatecoinwax&filter=eosio.token:transfer,skatecoinwax:transfer&limit=100`;
            const hRes = await fetch(historyUrl);
            const hJson = await hRes.json();

            const blacklist = ['eosio.token', 'skatecoinwax', 'swap.alcor', 'alcorammswap'];
            let sponsors = {};
            let pulseItems = [];
            let currentUserUsdTotal = 0;

            if (hJson && hJson.actions) {
                hJson.actions.forEach(action => {
                    const data = action.act.data;
                    const fromAcc = data.from;
                    const blockTime = new Date(action.timestamp);

                    if (data && data.to === 'skatecoinwax' && data.quantity) {
                        const quantityStr = data.quantity;
                        const [amtVal, symbol] = quantityStr.split(' ');
                        const amount = parseFloat(amtVal) || 0;
                        const memo = data.memo || "";

                        if (!blacklist.includes(fromAcc) && amount > 0) {
                            const valueInWax = symbol === 'WAX' ? amount : amount * sWax;
                            const valueInUsd = valueInWax * waxUsdPrice;

                            let itemType = "BLESSING";
                            let labelColor = "var(--accent-gold)";
                            let displayMemo = memo || "Direct Support";

                            if (memo.includes('"sk8dao":"v1"')) {
                                try {
                                    const pMemo = JSON.parse(memo);
                                    if(pMemo.action === "vote") { itemType = "GOVERNANCE"; labelColor = "var(--accent-cyan)"; displayMemo = `Voted ${pMemo.vote} on Motion`; } 
                                    else if(pMemo.action === "propose") { itemType = "LEGISLATION"; labelColor = "var(--accent-pink)"; displayMemo = `Drafted Bill: ${pMemo.title}`; } 
                                    else if(pMemo.action === "withdraw") { itemType = "REVOCATION"; labelColor = "var(--accent-pink)"; displayMemo = `Withdrew Motion: ${pMemo.id}`; }
                                } catch(e) {}
                            }

                            if (!sponsors[fromAcc]) { sponsors[fromAcc] = { waxTotal: 0, skateTotal: 0, powerValueUsd: 0 }; }
                            if (symbol === 'WAX') sponsors[fromAcc].waxTotal += amount;
                            else sponsors[fromAcc].skateTotal += amount;
                            sponsors[fromAcc].powerValueUsd += valueInUsd;

                            pulseItems.push({
                                account: fromAcc, amountStr: `${amount.toLocaleString()} ${symbol}`, displayMemo: displayMemo,
                                itemType: itemType, labelColor: labelColor, time: blockTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), timestamp: blockTime.getTime()
                            });
                        }
                    }
                });
            }

            // --- EXTRACT RANK & SET VOTING WEIGHT ---
            if (currentSession) {
                const myAcc = currentSession.actor.toString();
                if (sponsors[myAcc]) currentUserUsdTotal = sponsors[myAcc].powerValueUsd;
                if (myAcc === ADMIN_WALLET) currentUserUsdTotal = 100000; 
                
                const myRankInfo = calculateDaoRank(currentUserUsdTotal);
                window.currentUserMaxVotes = myRankInfo.votes; // Bind to slider limits

                const rankDOM = document.getElementById('user-dao-rank');
                const badgeDOM = document.getElementById('user-badges-container');
                const weightDOM = document.getElementById('user-vote-weight');

                if(rankDOM) {
                    rankDOM.innerText = myRankInfo.rank;
                    rankDOM.style.color = myRankInfo.color;
                    badgeDOM.innerHTML = `<span class="micro-badge-pill ${myRankInfo.badge}">${myRankInfo.rank}</span>`;
                    if(weightDOM) weightDOM.innerText = window.currentUserMaxVotes.toLocaleString();
                }
            }

            // Render Leaderboard
            if(whaleList) {
                const sortedSponsors = Object.keys(sponsors).map(acc => ({ account: acc, ...sponsors[acc] })).sort((a, b) => b.powerValueUsd - a.powerValueUsd).slice(0, 100);
                if (sortedSponsors.length === 0) {
                    whaleList.innerHTML = `<div style="padding: 20px; text-align: center; color: #888; font-family: 'Orbitron'; font-size: 0.8rem;">THE WHALE BOARD IS OPEN</div>`;
                } else {
                    whaleList.innerHTML = sortedSponsors.map((sp, idx) => {
                        const rankData = calculateDaoRank(sp.powerValueUsd);
                        return `
                            <div style="display:flex; justify-content:space-between; padding: 15px 10px; border-bottom: 1px solid #112; align-items: center;">
                                <div style="font-family:'Orbitron'; font-weight:900; color: ${rankData.color}; font-size: 0.9rem;">
                                    ${idx + 1}. ${sp.account} <div class="badge-pill-container"><span class="micro-badge-pill ${rankData.badge}">${rankData.rank}</span></div>
                                </div>
                                <div style="text-align: right;">
                                    <div style="color:#fff; font-family:'Orbitron'; font-weight:900; font-size: 0.85rem;">${sp.waxTotal.toLocaleString(undefined, {maximumFractionDigits: 2})} WAX</div>
                                    <div style="color:var(--accent-cyan); font-size: 0.7rem; font-family:'Orbitron'; font-weight:900;">${sp.skateTotal.toLocaleString(undefined, {maximumFractionDigits: 4})} SKATE</div>
                                </div>

    async function refreshDAODashboard() {
        const list = document.getElementById("active-motions-list");
        if(list) list.innerHTML = `<div style="text-align:center; color:var(--accent-cyan); padding: 40px; font-family:'Orbitron';">INTERCEPTING SUPREME COURT LEDGER...</div>`;

        let proposals = {};
        let withdrawnIds = new Set();
        const DAO_TTL_MS = 7 * 24 * 60 * 60 * 1000; 

        try {
            const historyUrl = `${HISTORY_RPC}/v2/history/get_actions?account=skatecoinwax&filter=skatecoinwax:transfer&limit=500`;
            const res = await fetch(historyUrl);
            const json = await res.json();

            if (json && json.actions) {
                json.actions.forEach(action => {
                    const data = action.act.data;
                    const memo = data.memo || "";
                    const blockTime = new Date(action.timestamp).getTime();

                    if (data.to === 'skatecoinwax' && memo.includes('"sk8dao":"v1"')) {
                        try {
                            const parsedMemo = JSON.parse(memo);
                            const sender = data.from;
                            const weight = parseFloat(data.quantity.split(' ')[0]);

                            if (parsedMemo.action === "propose") {
                                proposals[action.trx_id] = { 
                                    id: action.trx_id, title: parsedMemo.title, desc: parsedMemo.desc, 
                                    proposer: sender, yesWeight: 0, noWeight: 0, time: blockTime
                                };
                            } else if (parsedMemo.action === "vote" && parsedMemo.id) {
                                if (proposals[parsedMemo.id]) {
                                    if (parsedMemo.vote === "YES") proposals[parsedMemo.id].yesWeight += weight;
                                    if (parsedMemo.vote === "NO") proposals[parsedMemo.id].noWeight += weight;
                                }
                            } else if (parsedMemo.action === "withdraw" && parsedMemo.id) {
                                withdrawnIds.add(parsedMemo.id);
                            }
                        } catch(e) {}
                    }
                });
            }
        } catch(e) { console.error("Scraper Error:", e); }

        activeProposals = [];
        const now = Date.now();

        Object.values(proposals).forEach(p => {
            const expiresAt = p.time + DAO_TTL_MS;
            if (now <= expiresAt && !withdrawnIds.has(p.id)) {
                p.expiresAt = expiresAt;
                activeProposals.push(p);
            }
        });

        activeProposals.sort((a, b) => b.time - a.time);
        
        const countDOM = document.getElementById("dao-active-motions-count");
        if(countDOM) countDOM.innerText = activeProposals.length;

        renderDAOList();
    }

                        const truckName = MetaParser.getString(n, 'trucks', 'STOCK');
                        const wheelName = MetaParser.getString(n, 'wheels', 'STOCK');
                        const bearingName = MetaParser.getString(n, 'bearings', 'STOCK');
                        const bearingClass = bearingName === 'RGB' ? 'text-rgb' : '';
                        
                        statHtml = `
                            <div class="meta-group">
                               <div class="rgb-hud-frame cyber-yellow-frame" style="padding: 10px; background: rgba(0,0,0,0.4); border-radius: 6px; margin-bottom: 10px; border-width: 1px !important;">
                                    <div style="display:flex; justify-content:space-between; font-family:'Orbitron'; font-size:0.55rem; color:#888; margin-bottom:4px;">DECK <span style="color:var(--accent-cyber-yellow)">${deckName}</span></div>
                                    <div style="display:flex; justify-content:space-between; font-family:'Orbitron'; font-size:0.55rem; color:#888; margin-bottom:4px;">TRUCKS <span style="color:var(--accent-cyber-yellow)">${truckName}</span></div>
                                    <div style="display:flex; justify-content:space-between; font-family:'Orbitron'; font-size:0.55rem; color:#888; margin-bottom:4px;">WHEELS <span style="color:var(--accent-cyber-yellow)">${wheelName}</span></div>
                                    <div style="display:flex; justify-content:space-between; font-family:'Orbitron'; font-size:0.55rem; color:#888; margin-bottom:4px;">BEARINGS <span style="color:var(--accent-cyber-yellow)" class="${bearingClass}">${bearingName}</span></div>
                                </div>
                                <div class="meta-title">PERFORMANCE</div>
                                <div class="rgb-hud-frame cyber-yellow-frame" style="padding: 10px; background: rgba(0,0,0,0.4); border-radius: 6px; border-width: 1px !important;">
                                    ${renderStat('POP', pop, 'stat-pop', 20)}${renderStat('BALANCE', balance, 'stat-balance', 20)}${renderStat('SPEED', speed, 'stat-speed', 20)}${renderStat('TOTAL POWER', totalPower, 'stat-total', 30)}
                                </div>
                            </div>`;
                        
                        actionHtml = `
                            <div class="claim-zone">
                                <div><div class="reward-skate" style="display:flex; align-items:center;"><img src="https://ipfs.io/ipfs/bafybeifeyjngg5kvmkv56aowt2jad2txdo737yonaor3hcgrroyrqjfx3m" class="skate-icon"> ${skateReward.toLocaleString()}</div><div class="reward-wax">≈ ${waxValue} WAX</div></div>
                                <button class="wallet-btn" onclick="showErrorModal('Staking expansion coming soon.')" style="padding: 10px 15px;">STAKE</button>
                            </div>`;
                    } else {
                        const brandStr = MetaParser.getString(n, 'brand', 'STOCK'), colorStr = MetaParser.getString(n, 'color', 'STOCK');
                        statHtml = `
                            <div class="meta-group">
                             <div class="rgb-hud-frame cyber-yellow-frame" style="padding: 10px; background: rgba(0,0,0,0.4); border-radius: 6px; margin-bottom: 10px; border-width: 1px !important;">
                                    <div style="display:flex; justify-content:space-between; font-family:'Orbitron'; font-size:0.55rem; color:#888; margin-bottom:4px;">BRAND <span style="color:#fff">${brandStr}</span></div>
                                    <div style="display:flex; justify-content:space-between; font-family:'Orbitron'; font-size:0.55rem; color:#888; margin-bottom:4px;">COLOR <span style="color:#fff">${colorStr}</span></div>
                                </div>
                                <div class="meta-title">COMPONENT TRAITS</div>
                               <div class="rgb-hud-frame cyber-yellow-frame" style="padding: 10px; background: rgba(0,0,0,0.4); border-radius: 6px; border-width: 1px !important;">
                                    ${renderStat('POP', pop, 'stat-pop', 20)}${renderStat('BALANCE', balance, 'stat-balance', 20)}${renderStat('SPEED', speed, 'stat-speed', 20)}
                                </div>
                            </div>`;
                        actionHtml = `
                            <div style="background: rgba(0,0,0,0.8); border-top: 1px solid var(--accent-gold); display: flex; gap: 10px; justify-content: center; padding: 15px;">
                                <button class="wallet-btn" onclick="window.open('https://wax.atomichub.io/explorer/asset/${n.asset_id}', '_blank')" style="background: var(--accent-gold); color: #000; flex: 1; font-size: 0.65rem; clip-path: none; padding: 12px 5px;">VIEW ASSET</button>
                                <button class="wallet-btn" onclick="window.open('https://wax.atomichub.io/market?collection_name=${COLLECTION}&template_id=${tplId}', '_blank')" style="background: transparent; border: 1px solid var(--accent-gold); color: var(--accent-gold); flex: 1; font-size: 0.65rem; clip-path: none; padding: 12px 5px;">FIND ON MARKET</button>
                            </div>`;
                    }

                    const cleanRar = rarity.toLowerCase().trim();
                    const isGodTier = ['epic', 'legendary', 'mythic', 'insane', 'ridiculous'].includes(cleanRar);
                    
                    let cardClass = isGodTier ? `skate-card card-glow-${cleanRar}` : `skate-card`;
                    let cardStyle = isGodTier ? "" : `border-color: var(--rarity-${cleanRar}); box-shadow: inset 0 0 10px rgba(255,255,255,0.02);`;
                    let headerStyle = isGodTier ? "" : `background: var(--rarity-${cleanRar}); box-shadow: 0 0 15px var(--rarity-${cleanRar});`;

                    const checkBearing = MetaParser.getString(n, 'bearings', 'STOCK');
                    if (checkBearing === 'RGB') {
                        cardClass = 'skate-card card-glow-rgb';
                        cardStyle = ''; headerStyle = '';
                    }
                    
                    let badgeStyle = "color: #ffffff; border-color: rgba(255, 255, 255, 0.4);";
                    if (mN == 1) badgeStyle = "color: #00ffaa; border-color: #00ffaa; text-shadow: 0 0 10px #00ffaa;";

                    return `<div class="${cardClass}" style="${cardStyle}">
                                <div class="rarity-header" style="${headerStyle}">
                                    <div class="mint-badge" style="${badgeStyle}">#${mN}</div>
                                    <div class="rarity-header-text">${rarity}</div>
                                </div>
                                <div class="img-wrap"><img src="https://ipfs.io/ipfs/${img}" class="skate-img" onerror="this.style.display='none'"></div>
                                <div class="card-body">
                                    <div class="board-name">${n.name}</div>
                                    ${statHtml}
                                </div>
                                ${actionHtml}
                            </div>`;
                }).join('');

                if (!append) {
                    if (json.data.length === 0) grid.innerHTML = `<h3 style="grid-column: 1/-1; text-align: center; color: #888; font-family: 'Orbitron'; font-weight: 900;">TRUNK IS EMPTY</h3>`;
                    else grid.innerHTML = htmlCards;
                } else grid.insertAdjacentHTML('beforeend', htmlCards);
                
                if (json.data.length === 12) loadMoreBtn.style.display = 'block'; else loadMoreBtn.style.display = 'none';
            }
        } catch (e) {
            if (!append) grid.innerHTML = `<h3 style="grid-column: 1/-1; text-align: center; color: #ff3366; font-family: 'Orbitron'; font-weight: 900;">CONNECTION ERROR</h3>`;
        }
    }

    window.loadMoreInventory = () => { if (!currentSession) return; currentInventoryPage++; fetchInventory(currentSession.actor.toString(), true); };
    document.getElementById('login-trigger-vip').addEventListener('click', async () => { const { session } = await sessionKit.login(); location.reload(); });
    document.getElementById('logout-trigger').addEventListener('click', async () => { await sessionKit.logout(); location.reload(); });
    window.openCraftConfirmModal = () => { document.getElementById('modal-wax-fee').innerText = `${calculatedWaxFee.toLocaleString()} WAX`; document.getElementById('craft-confirm-modal').style.display = 'flex'; };

    window.executeBlend = async () => {
        if (!currentSession || selectedAssetIds.length !== 7) return;
        const formattedWax = Number(calculatedWaxFee).toFixed(8) + " WAX";
        try {
            const actions = [
                { account: 'atomicassets', name: 'transfer', authorization: [currentSession.permissionLevel], data: { from: currentSession.actor.toString(), to: 'skatecoinwax', asset_ids: selectedAssetIds, memo: "SKATEBOARD BUILD INGREDIENTS" } },
                { account: 'eosio.token', name: 'transfer', authorization: [currentSession.permissionLevel], data: { from: currentSession.actor.toString(), to: 'ufuau.wam', quantity: formattedWax, memo: "SKATEBOARD BUILD PAYMENT" } }
            ];
            await currentSession.transact({ actions });
            showSuccessModal("FABRICATION INITIATED", "Thank you, your board will be shipped soon!");
            loadCraftingData(currentSession.actor.toString()); updateBalances(currentSession.actor.toString());
        } catch (e) { console.error(e); showErrorModal("Transaction Cancelled or Failed."); }
    };
</script>
</head>
</html>
