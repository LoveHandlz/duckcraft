<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>sk8dao | DIRECT BLOCKCHAIN DROP GATEWAY</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* --- DESIGN FRAME MATRIX --- */
        :root {
            --bg-deep: #050a1a;
            --bg-panel: rgba(15, 26, 71, 0.95);
            --accent-cyan: #00f0ff;
            --accent-cyber-yellow: #ffea00; 
            --accent-pink: #ff0055;
            --accent-gold: #ffd700;
        }

        body { 
            background-color: var(--bg-deep);
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-image: radial-gradient(circle at 50% 50%, #162a5e 0%, #050a1a 100%); 
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #000;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-cyber-yellow);
            box-shadow: 0 0 25px rgba(255,234,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Orbitron';
            font-weight: 900;
            color: var(--accent-cyber-yellow);
            margin: 0;
            font-size: 1.6rem;
            text-transform: lowercase;
        }

        /* --- AUTH DISPLAY FLOATING CLUSTERS --- */
        .auth-cluster {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .balance-pill { 
            background: rgba(255, 234, 0, 0.05); 
            border: 1px solid var(--accent-cyber-yellow); 
            padding: 6px 15px; 
            border-radius: 50px; 
            font-family: 'Orbitron'; 
            font-size: 0.65rem; 
            display: flex; 
            gap: 15px; 
        }
        .balance-pill span { color: var(--accent-gold); font-weight: 900; }

        .wallet-btn {
            background: var(--accent-cyber-yellow);
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: 'Orbitron';
            font-weight: 900;
            cursor: pointer;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
            transition: 0.2s;
        }
        .wallet-btn:hover { background: #fff; }
        
        .wallet-btn.disconnect {
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid var(--accent-pink);
            color: var(--accent-pink);
        }
        .wallet-btn.disconnect:hover {
            background: var(--accent-pink);
            color: #000;
        }

        .container { 
            padding: 40px; 
            max-width: 1200px; 
            margin: auto; 
            flex: 1;
            width: 100%;
            box-sizing: border-box;
        }

        /* --- DISPLAY LAYOUT ELEMENT BLOCKS --- */
        .drop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .native-drop-card {
            background: var(--bg-panel);
            border: 2px solid var(--accent-cyber-yellow);
            box-shadow: 0 0 20px rgba(255, 234, 0, 0.05);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            background: var(--accent-cyber-yellow);
            color: #000;
            padding: 10px;
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 0.8rem;
            text-align: center;
        }

        .card-body {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .drop-title {
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--accent-cyan);
            margin: 0 0 15px 0;
            text-transform: uppercase;
        }

        .drop-meta {
            background: rgba(0,0,0,0.5);
            border: 1px dashed #333;
            padding: 10px;
            border-radius: 4px;
            font-family: 'Orbitron';
            font-size: 0.75rem;
            margin-bottom: 15px;
        }

        .claim-btn {
            width: 100%;
            background: var(--accent-cyan);
            color: #000;
            border: none;
            padding: 12px;
            font-family: 'Orbitron';
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .claim-btn:hover {
            background: var(--accent-pink);
            color: #fff;
            box-shadow: 0 0 15px var(--accent-pink);
        }
    </style>
</head>
