<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>sk8dao | NEFTY EMBEDDED MARKETPLACE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* --- GLOBAL retro STYLING --- */
        :root {
            --bg-deep: #050a1a;
            --accent-cyan: #00f0ff;
            --accent-cyber-yellow: #ffea00; 
            --accent-pink: #ff0055;

            /* --- EMBED VARIABLES INFECTION --- */
            --nefty-font-family: 'Orbitron', sans-serif;
            --nefty-font-size: 14px;
            --nefty-radius: 8px;
            --nefty-border-drop: var(--accent-cyber-yellow);
            --nefty-border-size: 2px;
            --nefty-color: #ffffff;
            --nefty-color-highlight: var(--accent-cyan);
            
            --nefty-btn-primary: #000000;
            --nefty-btn-primary-bg: var(--accent-cyber-yellow);
            --nefty-btn-primary-border: var(--accent-cyber-yellow);
        }

        body { 
            background-color: var(--bg-deep);
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-image: radial-gradient(circle at 50% 50%, #162a5e 0%, #050a1a 100%); 
            background-attachment: fixed;
        }

        .container { 
            padding: 40px; 
            max-width: 1200px; 
            margin: auto; 
        }

        /* --- HEAVY SHADOW DOM RENDERING FORCES --- */
        neftyblocks-drops::part(drop) {
            background: rgba(15, 26, 71, 0.9) !important;
            border: 2px solid var(--accent-cyber-yellow) !important;
            box-shadow: 0 0 25px rgba(255, 234, 0, 0.15);
        }
        neftyblocks-drops::part(drop-title) {
            color: var(--accent-cyan) !important;
            text-shadow: 0 0 8px var(--accent-cyan);
        }
    </style>
</head>
<body>

<div class="container">
    
    <div style="margin-bottom: 40px; text-align: center; border-left: 3px solid var(--accent-cyan); padding: 15px; background: rgba(0,0,0,0.4);">
        <h2 style="margin:0; font-family:'Orbitron'; font-weight:900; color:var(--accent-cyan); font-size:1.2rem;">SK8DAO DROP TERMINAL</h2>
    </div>

    <neftyblocks-drops 
        collection="skatecoinwax" 
        limit="8" 
        network="mainnet"
        chain="wax">
    </neftyblocks-drops>

</div>

<script type="module" src="https://cdn.jsdelivr.net/npm/@neftyblocks/drops@latest"></script>

</body>
</html>
